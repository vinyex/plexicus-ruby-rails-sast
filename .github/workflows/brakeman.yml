name: Brakeman — Continuous SAST

on:
  pull_request:
    paths:
      - "rails-app/**"
      - ".github/workflows/brakeman.yml"

permissions:
  contents:      read
  security-events: write
  pull-requests: write

jobs:
  brakeman-pr:
    name: "Brakeman PR Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Brakeman
        run: gem install brakeman --no-document

      - name: Brakeman (SARIF)
        working-directory: rails-app
        run: |
          brakeman \
            --format sarif \
            --output brakeman.sarif \
            --confidence-level 2 \
            --quiet || true

      - name: Upload results to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rails-app/brakeman.sarif
